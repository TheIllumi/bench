<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bench</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="title-bar">
      <div class="title-bar-drag" data-tauri-drag-region>
        <span class="titlebar-logo">bench</span>
        <button class="titlebar-shortcut-btn" id="titlebar-shortcut-btn" title="Open Command Palette (Ctrl+K)">ctrl+k</button>
      </div>
      <div class="titlebar-controls">
        <button class="win-btn" id="win-min" aria-label="minimize">
          <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
        </button>
        <button class="win-btn" id="win-max" aria-label="maximize">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="9" height="9"/></svg>
        </button>
        <button class="win-btn" id="win-close" aria-label="close">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor"><path d="M0.5 0.5 L9.5 9.5 M9.5 0.5 L0.5 9.5" stroke-width="1.2"/></svg>
        </button>
      </div>
    </div>
    <div class="app-container">
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <div class="sidebar-nav-primary">
            <a href="#" class="nav-item" data-module="focus">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
              <span class="nav-label">Focus</span>
              <span class="nav-shortcut">⌥1</span>
            </a>
            <a href="#" class="nav-item" data-module="capture">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
              <span class="nav-label">Capture</span>
              <span class="nav-shortcut">⌥2</span>
            </a>
            <a href="#" class="nav-item" data-module="areas">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polygon points="2 17 12 22 22 17"/><polygon points="2 12 12 17 22 12"/></svg>
              <span class="nav-label">Areas</span>
              <span class="nav-shortcut">⌥3</span>
            </a>
            <a href="#" class="nav-item" data-module="parking-lot">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
              <span class="nav-label">Parking Lot</span>
              <span class="nav-shortcut">⌥4</span>
            </a>
            <a href="#" class="nav-item" data-module="archive">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
              <span class="nav-label">Archive</span>
              <span class="nav-shortcut">⌥5</span>
            </a>
          </div>
          <div class="sidebar-nav-utility">
            <a href="#" class="nav-item" data-module="settings">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              <span class="nav-label">Settings</span>
              <span class="nav-shortcut">⌥6</span>
            </a>
            <button class="nav-item" id="sidebar-toggle" aria-label="Collapse sidebar">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide toggle-icon"><polyline points="15 18 9 12 15 6"/></svg>
              <span class="nav-label">Collapse</span>
              <span class="nav-shortcut">^B</span>
            </button>
          </div>
        </nav>
      </aside>

      <!-- Main Panel with Title and Content -->
      <main class="main-content">
        <header class="title-area">
          <h1 id="view-title">Focus</h1>
        </header>
        <section class="panel-primary" id="active-view"></section>
      </main>

      <!-- Inspector Panel (right side) -->
      <aside class="inspector-panel" id="inspector-panel"></aside>
    </div>
    <!-- Portals for overlays and notifications -->
    <div id="toast-portal"></div>
    <div id="overlay-portal"></div>
  </body>
</html>
